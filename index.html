// Analyze
function analyze(items, name='', base) {
  const now = base||new Date('2026-02-09');
  const d30=new Date(now); d30.setDate(d30.getDate()+30);
  const d90=new Date(now); d90.setDate(d90.getDate()+90);
  const m3=new Date(now); m3.setMonth(m3.getMonth()+3);
  const expired=items.filter(i=>{const e=P(i.expiryDate);return e&&e<now;});
  const d30I=items.filter(i=>{const e=P(i.expiryDate);return e&&e>=now&&e<=d30;});
  const d90I=items.filter(i=>{const e=P(i.expiryDate);return e&&e>d30&&e<=d90;});
  const d0to90=items.filter(i=>{const e=P(i.expiryDate);return e&&e>=now&&e<=d90;});
  const exp3m=items.filter(i=>{const e=P(i.expiryDate);return e&&e>now&&e<=m3;});
  const noOrder=items.filter(i=>i.noOrderFor6Months&&i.noOrderFor6Months.trim()!=='');
  const missing=items.filter(i=>(!i.expiryDate||i.expiryDate.trim()==='')&&i.inventoryPrice>0);
  const locMap=new Map();
  for(const item of items){if(!locMap.has(item.location))locMap.set(item.location,[]);locMap.get(item.location).push(item);}
  const locs=[];
  for(const [loc,li] of locMap){
    const tv=SUM(li);
    const ei=li.filter(i=>{const e=P(i.expiryDate);return e&&e>now&&e<=m3;});
    const ev=SUM(ei);
    const ni=li.filter(i=>i.noOrderFor6Months&&i.noOrderFor6Months.trim()!=='');
    const nv=SUM(ni);
    const mi=li.filter(i=>(!i.expiryDate||i.expiryDate.trim()==='')&&i.inventoryPrice>0);
    const mv=SUM(mi);
    locs.push({location:loc,totalValue:tv,itemCount:li.length,expiringItems:ei,expiringValue:ev,noOrderItems:ni,noOrderValue:nv,missingExpiryItems:mi,missingExpiryValue:mv,items:li,riskScore:ev*3+nv*2+mv*1});
  }
  const topRisk=[...locs].filter(l=>l.riskScore>0).sort((a,b)=>b.riskScore-a.riskScore).slice(0,5);
  const topVal=[...locs].sort((a,b)=>b.totalValue-a.totalValue).slice(0,5);
  const topMiss=[...locs].filter(l=>l.missingExpiryValue>0).sort((a,b)=>b.missingExpiryValue-a.missingExpiryValue).slice(0,5);
  const gMap=new Map(); for(const i of exp3m) gMap.set(i.location,(gMap.get(i.location)||0)+i.inventoryPrice);
  let gTop='',gTopV=0; for(const [l,v] of gMap) if(v>gTopV){gTopV=v;gTop=l;}
  const t=now; const rd=`${t.getFullYear()}. ${String(t.getMonth()+1).padStart(2,'0')}. ${String(t.getDate()).padStart(2,'0')}`;
  return {
    pharmacyName:name, totalInventoryValue:SUM(items), totalProducts:items.length, totalItems:items.reduce((s,i)=>s+(i.totalCount||0),0),
    returnableValue:SUM(items.filter(i=>{const e=P(i.expiryDate);return e&&e<=m3;})),
    stagnantValue:SUM(noOrder), expiringWithin3Months:exp3m, expiringWithin3MonthsValue:SUM(exp3m),
    noOrderItems:noOrder, noOrderValue:SUM(noOrder), missingExpiryItems:missing, missingExpiryValue:SUM(missing),
    locationSummaries:locs, topRiskLocations:topRisk, topValueLocations:topVal, topMissingExpiryLocations:topMiss,
    goldenTimeItems:exp3m, goldenTimeValue:SUM(exp3m), goldenTimeTopLocation:gTop, reportDate:rd,
    expiryD30:{items:d30I,count:d30I.length,value:SUM(d30I)},
    expiryD90:{items:d90I,count:d90I.length,value:SUM(d90I)},
    expiryD0to90:{items:d0to90,count:d0to90.length,value:SUM(d0to90)},
    alreadyExpired:{items:expired,count:expired.length,value:SUM(expired)},
  };
}

// Opportunity Section
function OpportunitySection({data}) {
  const [openModal, setOpenModal] = useState(null);
  const baseDate = new Date('2026-02-09');
  const parseE = s => { if(!s||s.trim()==='')return null; const c=s.trim().split(' ')[0]; if(/^\d{6}$/.test(c))return new Date(2000+parseInt(c.substring(0,2)),parseInt(c.substring(2,4))-1,parseInt(c.substring(4,6))); return null; };
  const getDays = (a,b) => Math.floor((b-a)/864e5);
  const isShort = i => (i.shortExpiryAtPurchase&&i.shortExpiryAtPurchase.trim()!=='') || (i.expiryUnder1Year&&i.expiryUnder1Year.trim()!=='');
  const sAI = data.noOrderItems.filter(i=>isShort(i));
  const sBI = data.noOrderItems.filter(i=>{ if(isShort(i))return false; const e=parseE(i.expiryDate); if(!e)return false; return getDays(baseDate,e)<=180; });
  const sCI = data.noOrderItems.filter(i=>{ if(isShort(i))return false; const e=parseE(i.expiryDate); if(!e)return true; return getDays(baseDate,e)>180; });
  const vals = arr => ({count:arr.length, value:SUM(arr), mw:Math.round(SUM(arr)/10000)});

     bg:'#f0f9ff',border:'#bae6fd',iconC:'#0284c7',labelC:'#0369a1',countC:'#0c4a6e',title:'D-30 이내 만료 임박',accentC:'#0284c7'},
    {key:'d90',label:'D-30~90',Icon:AlertTri,count:data.expiryD90.count,value:data.expiryD90.value,items:data.expiryD90.items,
     bg:'#eff6ff',border:'#bfdbfe',iconC:'#2563eb',labelC:'#1d4ed8',countC:'#1e3a8a',title:'D-30~90 만료 임박',accentC:'#2563eb'},
    {key:'exp',label:'유통기한 만료',Icon:XCircleI,count:data.alreadyExpired.count,value:data.alreadyExpired.value,items:data.alreadyExpired.items,
     bg:'#eef2ff',border:'#c7d2fe',iconC:'#4f46e5',labelC:'#4338ca',countC:'#1e1b4b',title:'유통기한 만료 제품',accentC:'#4f46e5'},
  ];
  const cur = cards.find(c=>c.key===active);
  return (
    <>
      <section className="my-20">
        <h2 className="text-2xl font-bold mb-2" style={V.foreground}>유효기한 임박 현황</h2>
        <p className="text-base mb-8 leading-relaxed" style={V.mutedC}>유효기간별로 분류한 현재 재고 현황입니다. 카드를 눌러 상세 리스트를 확인하세요.</p>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
          {cards.map(card=>(
            <button key={card.key} type="button" onClick={()=>setActive(card.key)}
              className="rounded-2xl p-5 text-left cursor-pointer hover:shadow-md active:scale-[0.97] transition-all"
              style={{backgroundColor:card.bg, border:`1px solid ${card.border}`}}>
              <div className="flex items-center gap-1.5 mb-3">
                <card.Icon c={`w-4 h-4`} />
                <span className="text-xs font-bold" style={{color:card.labelC}}>{card.label}</span>
              </div>
              <p className="text-2xl font-bold" style={{color:card.countC}}>{card.count}<span className="text-base font-medium ml-0.5">개</span></p>
              <p className="text-sm font-medium mt-1" style={{color:card.labelC}}>{card.value>0?FMTX(card.value):'-'}</p>
            </button>
          ))}
        </div>
      </section>
      {active && cur && (
        <Modal isOpen={true} onClose={()=>setActive(null)} title={cur.title}
          subtitle={`${cur.items.length}개 품목 / ${FMTX(SUM(cur.items))}`} subtitleStyle={{color:cur.accentC}}>
          <ItemTable items={cur.items} showDDay={true} />
        </Modal>
      )}
    </>
  );
}

// Location Detail Modal
function LocationModal({loc, isOpen, onClose}) {
  if(!loc) return null;
  return (
    <Modal isOpen={isOpen} onClose={onClose} title={loc.location}
      subtitle={`재고 가치 ${FMTX(loc.totalValue)}`} subtitleStyle={V.primaryC}>
      <div className="flex gap-4 mb-6 text-sm overflow-x-auto pb-2">
        <div className="text-center min-w-max"><p className="text-xs mb-1" style={V.mutedC}>품목 수</p><p className="font-bold" style={V.foreground}>{loc.itemCount}개</p></div>
        {loc.expiringValue>0&&<div className="text-center min-w-max"><p className="text-xs mb-1" style={V.mutedC}>임박 금액</p><p className="font-bold" style={V.destructiveC}>{FMTX(loc.expiringValue)}</p></div>}
        {loc.noOrderValue>0&&<div className="text-center min-w-max"><p className="text-xs mb-1" style={V.mutedC}>미주문</p><p className="font-bold" style={V.destructiveC}>{FMTX(loc.noOrderValue)}</p></div>}
      </div>
      <ItemTable items={loc.items} />
    </Modal>
  );
}

// Location Analysis
function LocationAnalysis({data, onOpenModal}) {
  const badges = [
    {label:'고위험', bg:'hsl(354 70% 60% / 0.1)', color:'var(--destructive)'},
    {label:'주의', bg:'#fef3c7', color:'#d97706'},
    {label:'관심', bg:'hsl(214 84% 58% / 0.1)', color:'var(--primary)'},
  ];

  const borderColors = ['#ef4444','#fbbf24','#60a5fa'];
  return (
    <section className="my-20">
      <h2 className="text-2xl font-bold mb-8" style={V.foreground}>위치별 정밀 분석 지도</h2>
      {data.topRiskLocations.length>0 && (
        <div className="mb-12">
          <h3 className="text-lg font-bold mb-2" style={V.destructiveC}>확인이 시급한 곳 (Risk Top {Math.min(data.topRiskLocations.length,3)})</h3>
          <p className="text-sm mb-6 px-2" style={V.mutedC}>단순 금액 순이 아닌, '관리 사각지대'와 '자금 고착화' 정도를 기준으로 선정된 우선순위입니다.</p>
          <div className="flex flex-col gap-4">
            {data.topRiskLocations.slice(0,3).map((loc,i)=>{
              const badge=badges[Math.min(i,2)];
              return (
                <button key={loc.location} type="button" onClick={()=>onOpenModal(loc)}
                  className="rounded-[20px] sm:rounded-[24px] p-4 sm:p-6 transition-all cursor-pointer hover:shadow-md hover:-translate-y-0.5 text-left"
                  style={{...V.bg, border:'1px solid var(--border)', borderLeft:`10px solid ${borderColors[Math.min(i,2)]}`}}>
                  <div className="flex justify-between items-start gap-3 sm:gap-4 mb-4">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <h3 className="text-lg sm:text-xl font-bold truncate" style={V.foreground}>{loc.location}</h3>
                        <span className="px-2 py-1 rounded-md text-xs font-bold flex-shrink-0" style={{backgroundColor:badge.bg, color:badge.color}}>{badge.label}</span>
                      </div>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <p className="text-xs" style={V.mutedC}>총 재고</p>
                      <p className="text-base sm:text-lg font-bold" style={V.foreground}>{FMT(loc.totalValue)}</p>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3 text-xs pt-3 sm:pt-4" style={{borderTop:'1px solid var(--border)'}}>
                    <div><p className="mb-1" style={V.mutedC}>임박 금액 (3개월)</p><p className="font-bold" style={V.destructiveC}>{FMT(loc.expiringValue)}</p></div>
                    <div><p className="mb-1" style={V.mutedC}>장기 미처방</p><p className="font-bold" style={V.destructiveC}>{FMT(loc.noOrderValue)}</p></div>
                    <div><p className="mb-1" style={V.mutedC}>유효기한 누락</p><p className="font-bold" style={{color:'#d97706'}}>{FMT(loc.missingExpiryValue)}</p></div>
                    <div><p className="mb-1" style={V.mutedC}>품목 수</p><p className="font-medium" style={V.foreground}>{loc.itemCount}개</p></div>
                  </div>
                  <div className="mt-3 text-center">
                    <p className="text-xs font-bold flex items-center justify-center gap-1" style={V.primaryC}>
                      클릭하여 품목 리스트 보기 <ChevDown c="w-3 h-3" />
                    </p>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}
      {data.topValueLocations.length>0 && (
        <div className="mb-12">
          <h3 className="text-lg font-bold mb-4" style={V.foreground}>돈이 가장 많이 묶인 곳</h3>
          <div className="flex flex-col gap-3">
            {data.topValueLocations.slice(0,5).map((loc,i)=>(
              <button key={loc.location} type="button" onClick={()=>onOpenModal(loc)}
                className="rounded-[20px] sm:rounded-[24px] p-4 sm:p-6 transition-all cursor-pointer hover:shadow-md hover:-translate-y-0.5 text-left"
                style={{...V.bg, border:'1px solid var(--border)'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--primary)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                <div className="flex justify-between items-center gap-3">
                  <div className="flex items-center gap-2 sm:gap-4 min-w-0">
                    <span className="font-bold flex-shrink-0" style={V.primaryC}>{i+1}</span>
                    <p className="font-bold truncate" style={V.foreground}>{loc.location}</p>
                  </div>
                  <p className="font-bold flex-shrink-0 text-sm sm:text-base" style={V.foreground}>{FMTX(loc.totalValue)}</p>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}
    </section>
  );
}

// Scan Missing
function ScanMissingSection({data, onOpenModal}) {
  if(data.missingExpiryValue===0) return null;
  return (
    <section className="my-20">
      <h2 className="text-2xl font-bold mb-4" style={V.foreground}>시스템 사각지대 보완</h2>
      <div className="rounded-[28px] p-6 md:p-8" style={{backgroundColor:'#fffbeb', border:'1px solid #fef08a'}}>
        <p className="text-base leading-relaxed" style={V.mutedC}>
          재고 중{' '}<span className="font-bold" style={V.foreground}>{FMT(data.missingExpiryValue)} ({data.missingExpiryItems.length}개 품목)</span>은 현재 유효기간 정보가 비어있습니다.
          이는 약국의 실수가 아니라 <span className="font-bold" style={{color:'#d97706'}}>자동 스캔이 불가능한 제품 고유의 특성</span> 때문이에요.
          <br /><br />
          <span className="font-bold" style={V.primaryC}>이 구역들만 날을 잡아 수동 입력</span>하시면 리스크 관리가 완벽해집니다.
        </p>
        <div className="mt-6 md:mt-8 flex flex-col gap-2 md:gap-3">
          {data.topMissingExpiryLocations.slice(0,5).map((loc,i)=>(
            <button key={loc.location} type="button" onClick={()=>onOpenModal(loc)}
              className="rounded-[24px] p-4 md:p-5 transition-all cursor-pointer text-left"
              style={{backgroundColor:'rgba(255,255,255,0.8)', border:'none'}}
              onMouseEnter={e=>e.currentTarget.style.backgroundColor='white'}
              onMouseLeave={e=>e.currentTarget.style.backgroundColor='rgba(255,255,255,0.8)'}>
              <div className="flex flex-col md:flex-row md:justify-between md:items-center gap-2">
                <div className="flex items-center gap-2 min-w-0 flex-1">
                  <span className="font-bold flex-shrink-0 text-sm md:text-base" style={{color:'#f59e0b'}}>{i+1}위</span>
                  <p className="font-bold text-sm md:text-base break-words" style={V.foreground}>{loc.location}</p>
                </div>
                <p className="text-xs md:text-sm font-bold flex-shrink-0" style={{color:'#d97706'}}>{FMTX(loc.missingExpiryValue)} ({loc.missingExpiryItems.length}개)</p>
              </div>
            </button>
          ))}
        </div>
      </div>
    </section>
  );
}

// Action Plan
function ActionPlanSection({data}) {
  return (
    <section className="my-20 pt-16" style={{borderTop:'1px solid var(--border)'}}>
      <h2 className="text-2xl font-bold mb-8 text-center" style={V.foreground}>내일의 약국을 위한 액션</h2>
      <div className="flex flex-col gap-4">
        <div className="flex items-start gap-4 p-6 rounded-[32px]" style={{...V.primaryBg5, border:'1px solid hsl(214 84% 58% / 0.1)'}}>
          <div className="w-12 h-12 rounded-full flex items-center justify-center shadow-sm flex-shrink-0" style={{...V.bg,...V.primaryC}}><Trash2 c="w-5 h-5" /></div>
          <div>
            <p className="font-bold text-lg" style={V.foreground}>죽은 재고부터 선반에서 빼기</p>
            <p className="text-sm mt-1 leading-relaxed" style={V.mutedC}>6개월간 미주문된 품목 {data.noOrderItems.length}개를 빼는 것만으로도 조제 동선이 <span className="font-bold">15% 빨라집니다.</span></p>
          </div>
        </div>
        <div className="flex items-start gap-4 p-6 rounded-[32px]" style={{...V.card, border:'1px solid var(--border)'}}>
          <div className="w-12 h-12 rounded-full flex items-center justify-center shadow-sm flex-shrink-0" style={{...V.bg,...V.foreground}}><TrendingUp c="w-5 h-5" /></div>
          <div>
            <p className="font-bold text-lg" style={V.foreground}>현금 회수 리스트 확인</p>
            <p className="text-sm mt-1 leading-relaxed" style={V.mutedC}>임박 금액 {FMT(data.expiringWithin3MonthsValue)}은 손실이 아닙니다. 내일 반품하면 모레 통장에 찍힐 <span className="font-bold">준비된 현금</span>입니다.</p>
          </div>
        </div>
      </div>
    </section>
  );
}

// Export Section
function ExportSection({data}) {
  const handleDownload = () => {
    const rows = [['위치','제품명','재고가격','유효기간','6개월 미주문','유효기간 1년 미만']];
    for(const loc of data.locationSummaries) for(const item of loc.items) rows.push([item.location,item.productName,item.inventoryPrice.toString(),item.expiryDate,item.noOrderFor6Months||'',item.expiryUnder1Year||'']);
    const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=`약국재고_분석결과_${data.reportDate.replace(/\. /g,'')}.csv`; a.click(); URL.revokeObjectURL(url);
  };
  return (
    <section className="my-24">
      <h2 className="text-2xl font-bold mb-6" style={V.foreground}>현장 관리를 위한 자료</h2>
      <button type="button" onClick={handleDownload}
        className="flex items-center justify-between p-6 rounded-[28px] cursor-pointer transition-colors text-left w-full"
        style={{...V.card, border:'1px solid var(--border)'}}
        onMouseEnter={e=>e.currentTarget.style.backgroundColor='var(--muted)'}
        onMouseLeave={e=>e.currentTarget.style.backgroundColor='var(--card)'}>
        <div className="flex items-center gap-4">
          <div className="w-12 h-12 rounded-full flex items-center justify-center shadow-sm" style={{...V.bg, color:'#16a34a'}}><FileSpr c="w-5 h-5" /></div>
          <div>
            <p className="font-bold" style={V.foreground}>전체 로우데이터 다운로드</p>
            <p className="text-xs mt-1" style={V.mutedC}>CSV {data.totalProducts.toLocaleString()}개 품목 정밀 분석 완료</p>
          </div>
        </div>
        <ChevRight c="w-5 h-5" />
      </button>
    </section>
  );
}

// Main Report
function InventoryReport({data}) {
  const [selLoc, setSelLoc] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const openModal = loc => { setSelLoc(loc); setModalOpen(true); };
  const closeModal = () => { setModalOpen(false); setTimeout(()=>setSelLoc(null),300); };
  return (
    <>
      <div className="max-w-[640px] mx-auto px-6 py-16 pb-32">
        <HeroSection data={data} />
        <CashFlowCard data={data} />
        <OpportunitySection data={data} />
        {data.goldenTimeItems.length>0 && <GoldenTimeSection data={data} />}
        <ExpiryStatusSection data={data} />
        <LocationAnalysis data={data} onOpenModal={openModal} />
        <ScanMissingSection data={data} onOpenModal={openModal} />
        <ActionPlanSection data={data} />
        <ExportSection data={data} />
        <footer className="mt-32 text-center">
          <p className="text-sm italic" style={{color:'hsl(215 16% 35% / 0.5)'}}>약국 데이터 경영의 새로운 흐름, 데이터 파트너</p>
          <div className="flex justify-center gap-4 mt-10">
            <button type="button" onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
              className="w-10 h-10 rounded-full flex items-center justify-center transition-colors cursor-pointer"
              style={{...V.card, color:'var(--muted-foreground)'}} aria-label="맨 위로">
              <ArrowUpI c="w-4 h-4" />
            </button>
          </div>
        </footer>
      </div>
      <LocationModal loc={selLoc} isOpen={modalOpen} onClose={closeModal} />
    </>
  );
}

function App() {
  const data = analyze(window.ITEMS_DATA, '밝은약국', new Date('2026-02-09'));
  return <InventoryReport data={data} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
